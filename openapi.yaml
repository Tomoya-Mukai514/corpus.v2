openapi: 3.1.0
info:
  title: J-STAGE Proxy Starter
  version: 1.0.0
servers:
  - url: https://YOUR-RENDER-URL.onrender.com
paths:
  /answer:
    get:
      operationId: answerJstageQuery
      summary: Return candidate papers for a user query
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  query:
                    type: string
                  candidates:
                    type: array
                    items:
                      type: object
                      properties:
                        title:
                          type: string
                        authors:
                          type: array
                          items:
                            type: string
                        journal:
                          type: string
                        year:
                          type: string
                        doi:
                          type: string
                        link:
                          type: string
                        abstract:
                          type: string
        '400':
          description: Missing query
